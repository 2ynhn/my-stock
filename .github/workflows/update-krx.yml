name: Update KRX Stock List

on:
  workflow_dispatch:

jobs:
  update-krx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FinanceDataReader
        run: pip install finance-datareader

      - name: Fetch KRX full listing and build JSON
        run: |
          python3 << 'EOF'
          import json, sys
          import FinanceDataReader as fdr

          result = []
          seen = set()

          def add(code, name, suffix):
              code = str(code).strip().zfill(6)
              key = code + suffix
              name = (name or "").strip()
              if name and key not in seen:
                  seen.add(key)
                  result.append({"ticker": key, "name": name, "market": "KR"})

          # KOSPI / KOSDAQ 전종목
          krx = fdr.StockListing("KRX")
          name_col = "Name"
          code_col = "Code" if "Code" in krx.columns else "Symbol"
          for _, row in krx.iterrows():
              market = str(row.get("Market", ""))
              if market == "KOSPI":
                  add(row[code_col], row[name_col], ".KS")
              elif market == "KOSDAQ":
                  add(row[code_col], row[name_col], ".KQ")

          # ETF (KODEX, TIGER 등 — KOSPI 상장이므로 .KS)
          try:
              etf = fdr.StockListing("ETF/KR")
              ecode = "Symbol" if "Symbol" in etf.columns else "Code"
              for _, row in etf.iterrows():
                  add(row[ecode], row.get("Name"), ".KS")
          except Exception as e:
              print("ETF 수집 실패:", e)

          result.sort(key=lambda x: x["name"])

          ks = sum(1 for x in result if x["ticker"].endswith(".KS"))
          kq = sum(1 for x in result if x["ticker"].endswith(".KQ"))
          print(f"Total: {len(result)} (.KS: {ks}, .KQ: {kq})")

          # 안전장치: 비정상적으로 적으면 커밋하지 않도록 실패 처리
          if len(result) < 1000:
              print("ERROR: 결과가 너무 적습니다. 기존 파일을 유지합니다.")
              sys.exit(1)

          with open("public/krx-stocks.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          EOF

      - name: Commit updated krx-stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/krx-stocks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: KRX 전종목 데이터 자동 업데이트 $(date -u +'%Y-%m-%d')"
            git push
          fi

      # 봇 커밋은 deploy.yml 을 트리거하지 못하므로 여기서 직접 빌드/배포한다
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci && npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
