name: Update KRX Stock List

on:
  schedule:
    # 매일 오전 7시 (KST) = 22:00 UTC 전날
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-krx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pykrx
        run: pip install pykrx

      - name: Fetch KRX full listing and build JSON
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime, timedelta
          from pykrx import stock

          # 최근 영업일 탐색 (휴일/주말이면 빈 목록이 나올 수 있음)
          def recent_business_day():
              d = datetime.now()
              for _ in range(10):
                  ymd = d.strftime("%Y%m%d")
                  try:
                      if stock.get_market_ticker_list(ymd, market="KOSPI"):
                          return ymd
                  except Exception:
                      pass
                  d -= timedelta(days=1)
              return datetime.now().strftime("%Y%m%d")

          day = recent_business_day()
          print("기준일:", day)

          result = []
          seen = set()

          def add(ticker, name, suffix):
              key = ticker + suffix
              if name and key not in seen:
                  seen.add(key)
                  result.append({"ticker": key, "name": name.strip(), "market": "KR"})

          # KOSPI 전종목 (.KS)
          for t in stock.get_market_ticker_list(day, market="KOSPI"):
              add(t, stock.get_market_ticker_name(t), ".KS")

          # KOSDAQ 전종목 (.KQ)
          for t in stock.get_market_ticker_list(day, market="KOSDAQ"):
              add(t, stock.get_market_ticker_name(t), ".KQ")

          # ETF (KODEX, TIGER 등 — KOSPI 상장이므로 .KS)
          try:
              for t in stock.get_etf_ticker_list(day):
                  add(t, stock.get_etf_ticker_name(t), ".KS")
          except Exception as e:
              print("ETF 수집 실패:", e)

          result.sort(key=lambda x: x["name"])

          with open("public/krx-stocks.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          ks = sum(1 for x in result if x["ticker"].endswith(".KS"))
          kq = sum(1 for x in result if x["ticker"].endswith(".KQ"))
          print(f"Total: {len(result)} (.KS: {ks}, .KQ: {kq})")
          EOF

      - name: Commit updated krx-stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/krx-stocks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: KRX 전종목 데이터 자동 업데이트 $(date -u +'%Y-%m-%d')"
            git push
          fi
